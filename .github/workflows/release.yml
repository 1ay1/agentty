# Release pipeline for moha
#
# Triggers:
#   - Push of a tag matching v*  (e.g. v0.1.0)  → builds AND publishes a
#     GitHub Release with assets attached.
#   - workflow_dispatch (manual)                → builds only (no release).
#     Use this to validate the matrix on any branch before cutting a tag.
#
# Targets (all standalone — MOHA_STANDALONE=ON; libc stays dynamic on Linux
# per the README's "honest standalone" notes):
#   linux-x86_64    Ubuntu 22.04 + GCC 14 from the toolchain PPA
#   linux-arm64     Ubuntu 22.04 ARM runner + GCC 14
#   macos-x86_64    macOS 13 Intel runner
#   macos-arm64     macOS 14 Apple Silicon runner
#   windows-x86_64  Windows Server 2022 + MSVC 19.40+ via VS 2022
#
# Each platform produces a tarball / zip containing:
#   moha[.exe]       the binary
#   README.md        rendered as plain-text reference
#   LICENSE          (when present)
#
# A separate `release` job downloads every artifact, generates SHA256SUMS,
# and attaches everything to the GitHub Release.
#
# First-run caveats: cross-platform builds inevitably surface platform-
# specific quirks (vcpkg cache misses on Windows, Apple Clang version
# mismatches, etc.). Run via workflow_dispatch on a branch before tagging.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only, do not publish (forced true on workflow_dispatch)"
        required: false
        default: "true"

permissions:
  contents: write   # needed by the release job to create / update releases

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            os: ubuntu-22.04
            archive: tar.gz
          - target: linux-arm64
            os: ubuntu-22.04-arm
            archive: tar.gz
          - target: macos-x86_64
            os: macos-13
            archive: tar.gz
          - target: macos-arm64
            os: macos-14
            archive: tar.gz
          - target: windows-x86_64
            os: windows-2022
            archive: zip

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── Linux toolchain: GCC 14 + system OpenSSL/nghttp2 ──────────────
      - name: Linux deps (GCC 14, OpenSSL, nghttp2)
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 cmake ninja-build \
            libssl-dev libnghttp2-dev pkg-config
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      # ── macOS toolchain: Apple Clang + Homebrew OpenSSL/nghttp2 ───────
      - name: macOS deps (OpenSSL, nghttp2)
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew update
          brew install cmake ninja openssl@3 nghttp2 pkg-config
          # OpenSSL prefix differs by arch (Intel: /usr/local, ARM: /opt/homebrew)
          OPENSSL_ROOT="$(brew --prefix openssl@3)"
          echo "OPENSSL_ROOT_DIR=${OPENSSL_ROOT}"   >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${OPENSSL_ROOT}/lib/pkgconfig:$(brew --prefix nghttp2)/lib/pkgconfig" >> "$GITHUB_ENV"

      # ── Windows toolchain: vcpkg-managed OpenSSL + nghttp2 ────────────
      - name: Windows deps (vcpkg OpenSSL, nghttp2)
        if: startsWith(matrix.os, 'windows-')
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT/vcpkg.exe" install `
            openssl:x64-windows-static `
            nghttp2:x64-windows-static
          echo "VCPKG_TARGET_TRIPLET=x64-windows-static" >> $env:GITHUB_ENV
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV

      # ── Configure ────────────────────────────────────────────────────
      - name: Configure (Unix)
        if: "!startsWith(matrix.os, 'windows-')"
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMOHA_STANDALONE=ON

      - name: Configure (Windows)
        if: startsWith(matrix.os, 'windows-')
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DMOHA_STANDALONE=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" `
            -DVCPKG_TARGET_TRIPLET="$env:VCPKG_TARGET_TRIPLET"

      # ── Build ────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Smoke ────────────────────────────────────────────────────────
      - name: Smoke (binary exists + --version works)
        if: "!startsWith(matrix.os, 'windows-')"
        run: |
          ls -lh build/moha
          ./build/moha version || ./build/moha --version || true

      - name: Smoke (Windows)
        if: startsWith(matrix.os, 'windows-')
        shell: pwsh
        run: |
          dir build\Release\moha.exe
          .\build\Release\moha.exe version

      # ── Package ──────────────────────────────────────────────────────
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGE="moha-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp build/moha "$STAGE/"
          cp README.md "$STAGE/"
          [ -f LICENSE ] && cp LICENSE "$STAGE/" || true
          tar czf "${STAGE}.tar.gz" "$STAGE"
          ls -lh "${STAGE}.tar.gz"
          echo "ARTIFACT=${STAGE}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "moha-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item build/Release/moha.exe $stage/
          Copy-Item README.md $stage/
          if (Test-Path LICENSE) { Copy-Item LICENSE $stage/ }
          Compress-Archive -Path "$stage/*" -DestinationPath "$stage.zip"
          Get-ChildItem "$stage.zip"
          echo "ARTIFACT=$stage.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: moha-${{ matrix.target }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    # Only publish when invoked by a tag push, not on workflow_dispatch.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          ls -lh
          sha256sum moha-*.tar.gz moha-*.zip 2>/dev/null > SHA256SUMS || true
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/moha-*.tar.gz
            dist/moha-*.zip
            dist/SHA256SUMS
